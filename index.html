<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя IP-камера</title>
    <!-- Подключаем бесплатную библиотеку PeerJS для связи по всему миру -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background-color: #ffffff; padding: 24px; border-radius: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        h2 { color: #1a1c1e; text-align: center; }
        .video-wrapper { width: 100%; border-radius: 20px; overflow: hidden; background-color: #e1e2e8; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info-box { background: #d1e4ff; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; color: #001d36; word-break: break-all; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 14px; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; text-align: center; }
        .btn { border: none; padding: 14px; border-radius: 24px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-cam { background-color: #0061a4; color: white; }
        .btn-watch { background-color: #2e7d32; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Видеонаблюдение</h2>
        
        <div class="video-wrapper">
            <video id="video-player" autoplay playsinline></video>
        </div>

        <div id="status" class="info-box">Ожидание...</div>

        <div class="controls" id="mode-selection">
            <button class="btn btn-cam" onclick="startCameraMode()">1. Сделать это устройство КАМЕРОЙ</button>
            <input type="text" id="target-id" placeholder="Введите ID камеры сюда">
            <button class="btn btn-watch" onclick="startViewerMode()">2. СМОТРЕТЬ трансляцию</button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('video-player');
        const statusBox = document.getElementById('status');
        const peer = new Peer(); // Создаем подключение к бесплатному серверу PeerJS

        let myId = '';

        // Получаем свой уникальный ID от сервера
        peer.on('open', function(id) {
            myId = id;
            statusBox.innerText = "Готово к работе!";
        });

        // ==========================================
        // РЕЖИМ 1: ЭТО УСТРОЙСТВО РАБОТАЕТ КАК КАМЕРА
        // ==========================================
        async function startCameraMode() {
            try {
                // Включаем камеру планшета
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElement.srcObject = stream;
                videoElement.muted = true; // Выключаем звук у себя, чтобы не было эха
                
                statusBox.innerHTML = `Я КАМЕРА.<br>Мой ID: <b>${myId}</b><br><small>(Введи этот ID на другом устройстве)</small>`;
                document.getElementById('mode-selection').style.display = 'none';

                // Ждем входящего звонка от зрителя
                peer.on('call', function(call) {
                    call.answer(stream); // Автоматически отвечаем и передаем видео
                });

            } catch (err) {
                statusBox.innerText = "Ошибка доступа к камере!";
            }
        }

        // ==========================================
        // РЕЖИМ 2: ЭТО УСТРОЙСТВО СМОТРИТ
        // ==========================================
        function startViewerMode() {
            const camId = document.getElementById('target-id').value.trim();
            if (!camId) {
                alert("Сначала введите ID камеры!");
                return;
            }

            statusBox.innerText = "Подключение к камере...";
            document.getElementById('mode-selection').style.display = 'none';

            // "Звоним" на камеру по ее ID (видео с нашей стороны не передаем)
            const call = peer.call(camId, null);

            // Когда получаем видео от камеры, выводим на экран
            call.on('stream', function(remoteStream) {
                videoElement.srcObject = remoteStream;
                statusBox.innerText = "Трансляция идет!";
            });
        }
    </script>
</body>
</html>
