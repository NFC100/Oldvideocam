<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>OldCam — камера из старого телефона</title>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0f1115; color: #eaeaea;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 12px; }
  h1 { font-size: 22px; margin: 8px 0 16px; text-align: center; }
  .card {
    background: #1a1d24; border: 1px solid #2a2f3a;
    border-radius: 10px; padding: 14px; margin-bottom: 14px;
  }
  label { display: block; font-size: 14px; margin: 8px 0 4px; color: #aab; }
  input[type=text], input[type=password] {
    width: 100%; padding: 12px; font-size: 16px;
    background: #0f1115; color: #fff;
    border: 1px solid #333; border-radius: 8px;
  }
  button {
    width: 100%; padding: 14px; font-size: 17px; font-weight: bold;
    background: #2d7cf0; color: #fff; border: 0; border-radius: 10px;
    margin-top: 10px; cursor: pointer;
  }
  button.secondary { background: #3a3f4a; }
  button.danger { background: #c0392b; }
  button:disabled { background: #555; color: #999; }
  .row { display: -webkit-box; display: -ms-flexbox; display: flex; gap: 8px; }
  .row button { margin-top: 0; }
  video {
    width: 100%; background: #000; border-radius: 8px;
    max-height: 60vh; display: block;
  }
  .status {
    font-size: 13px; color: #aab; padding: 8px;
    background: #0f1115; border-radius: 6px; margin-top: 8px;
  }
  .hidden { display: none !important; }
  .mode-btn { font-size: 18px; padding: 18px; }
  .hint { font-size: 12px; color: #889; margin-top: 6px; }
  .toolbar { margin-top: 10px; }
  .toolbar button { margin-top: 8px; }
  .shot-list { margin-top: 10px; }
  .shot-list img {
    width: 100%; max-width: 300px; border-radius: 6px;
    margin: 4px; border: 1px solid #333;
  }
  .badge {
    display: inline-block; padding: 3px 8px; border-radius: 12px;
    font-size: 12px; background: #2d7cf0; color: #fff;
  }
  .badge.red { background: #c0392b; }
  .badge.green { background: #27ae60; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📹 OldCam</h1>

  <!-- Выбор режима -->
  <div id="screen-mode" class="card">
    <p style="text-align:center; margin:6px 0 14px;">Преврати старый телефон в камеру наблюдения</p>
    <button class="mode-btn" onclick="goMode('cam')">📷 Режим КАМЕРА<br><span class="hint">этот телефон стримит</span></button>
    <button class="mode-btn secondary" onclick="goMode('view')">👁 Режим ПРОСМОТР<br><span class="hint">смотреть с другого устройства</span></button>
  </div>

  <!-- Экран КАМЕРА -->
  <div id="screen-cam" class="hidden">
    <div class="card">
      <label>Пароль комнаты (придумай любой)</label>
      <input type="text" id="cam-pass" placeholder="например: myhome123">
      <p class="hint">Этот же пароль вводи на устройстве просмотра</p>

      <label>Камера</label>
      <select id="cam-select" style="width:100%;padding:12px;background:#0f1115;color:#fff;border:1px solid #333;border-radius:8px;font-size:16px;">
        <option value="environment">Задняя камера</option>
        <option value="user">Передняя камера</option>
      </select>

      <button onclick="startCam()">▶ Начать трансляцию</button>
      <button class="danger" onclick="stopCam()">⏹ Остановить</button>

      <div class="status" id="cam-status">Ожидание запуска…</div>
      <div class="hint" id="cam-hint"></div>
    </div>

    <div class="card">
      <video id="cam-preview" autoplay muted playsinline></video>
    </div>
  </div>

  <!-- Экран ПРОСМОТР -->
  <div id="screen-view" class="hidden">
    <div class="card">
      <label>Пароль комнаты</label>
      <input type="password" id="view-pass" placeholder="введи пароль от камеры">
      <button onclick="startView()">🔗 Подключиться</button>
      <button class="danger" onclick="stopView()">✖ Отключиться</button>
      <div class="status" id="view-status">Ожидание…</div>
    </div>

    <div class="card">
      <video id="view-video" autoplay playsinline controls></video>

      <div class="toolbar">
        <div class="row">
          <button onclick="takeShot()">📸 Скриншот</button>
          <button class="secondary" id="talk-btn" onclick="toggleTalk()">🎤 Говорить</button>
        </div>
        <button class="secondary" onclick="toggleFullscreen()">⛶ Полный экран</button>
      </div>

      <div class="shot-list" id="shots"></div>
    </div>
  </div>
</div>

<script>
// ===== Навигация =====
function goMode(m) {
  document.getElementById('screen-mode').className = 'hidden';
  if (m === 'cam') {
    document.getElementById('screen-cam').className = '';
  } else {
    document.getElementById('screen-view').className = '';
  }
}

// ===== Утилиты =====
function setStatus(id, text, color) {
  var el = document.getElementById(id);
  el.textContent = text;
  if (color) el.style.color = color;
}

// ===== Режим КАМЕРА =====
var camPeer = null;
var camStream = null;
var camCalls = [];

function startCam() {
  var pass = document.getElementById('cam-pass').value.trim();
  if (!pass) { alert('Введи пароль'); return; }

  var facing = document.getElementById('cam-select').value;
  setStatus('cam-status', 'Запрашиваю камеру…', '#f39c12');

  var constraints = {
    video: { facingMode: facing, width: { ideal: 640 }, height: { ideal: 480 } },
    audio: true
  };

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('cam-status', 'Браузер не поддерживает камеру. Нужен Android 4.4+ в Chrome.', '#e74c3c');
    return;
  }

  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      camStream = stream;
      document.getElementById('cam-preview').srcObject = stream;
      setStatus('cam-status', 'Камера включена. Подключаюсь к серверу…', '#f39c12');
      initCamPeer(pass);
    })
    .catch(function(err) {
      setStatus('cam-status', 'Ошибка камеры: ' + err.message, '#e74c3c');
    });
}

function initCamPeer(pass) {
  var peerId = 'oldcam-' + pass;
  camPeer = new Peer(peerId, { debug: 1 });

  camPeer.on('open', function(id) {
    setStatus('cam-status', '● В ЭФИРЕ. ID: ' + pass, '#27ae60');
    document.getElementById('cam-hint').textContent =
      'На другом устройстве открой эту же страницу, выбери ПРОСМОТР и введи пароль: ' + pass;
  });

  camPeer.on('call', function(call) {
    call.answer(camStream);
    camCalls.push(call);
    call.on('close', function() {
      var i = camCalls.indexOf(call);
      if (i >= 0) camCalls.splice(i, 1);
    });
  });

  camPeer.on('error', function(err) {
    setStatus('cam-status', 'Ошибка: ' + err.type + '. ID уже занят?', '#e74c3c');
  });
}

function stopCam() {
  if (camStream) {
    camStream.getTracks().forEach(function(t){ t.stop(); });
    camStream = null;
  }
  if (camPeer) { camPeer.destroy(); camPeer = null; }
  camCalls = [];
  document.getElementById('cam-preview').srcObject = null;
  setStatus('cam-status', 'Остановлено', '#aab');
  document.getElementById('cam-hint').textContent = '';
}

// ===== Режим ПРОСМОТР =====
var viewPeer = null;
var viewCall = null;
var viewMicStream = null;
var talking = false;

function startView() {
  var pass = document.getElementById('view-pass').value.trim();
  if (!pass) { alert('Введи пароль'); return; }

  setStatus('view-status', 'Подключаюсь…', '#f39c12');

  viewPeer = new Peer('oldcam-view-' + Math.random().toString(36).slice(2,8), { debug: 1 });

  viewPeer.on('open', function() {
    var targetId = 'oldcam-' + pass;
    // Запрашиваем и видео, и микрофон для двусторонней связи
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('view-status', 'Браузер не поддерживает WebRTC', '#e74c3c');
      return;
    }
    navigator.mediaDevices.getUserMedia({ video: false, audio: true })
      .then(function(mic) {
        viewMicStream = mic;
        viewCall = viewPeer.call(targetId, mic);
        bindViewCall();
      })
      .catch(function() {
        // даже без микрофона пробуем подключиться
        viewCall = viewPeer.call(targetId, null);
        bindViewCall();
      });
  });

  viewPeer.on('error', function(err) {
    setStatus('view-status', 'Ошибка: ' + err.type + '. Камера не в сети или неверный пароль.', '#e74c3c');
  });
}

function bindViewCall() {
  setStatus('view-status', 'Ожидание потока…', '#f39c12');
  viewCall.on('stream', function(remoteStream) {
    document.getElementById('view-video').srcObject = remoteStream;
    setStatus('view-status', '● Подключено', '#27ae60');
  });
  viewCall.on('close', function() {
    setStatus('view-status', 'Соединение закрыто', '#e74c3c');
  });
  viewCall.on('error', function(err) {
    setStatus('view-status', 'Ошибка звонка: ' + err, '#e74c3c');
  });
}

function stopView() {
  if (viewCall) { viewCall.close(); viewCall = null; }
  if (viewMicStream) { viewMicStream.getTracks().forEach(function(t){t.stop();}); viewMicStream = null; }
  if (viewPeer) { viewPeer.destroy(); viewPeer = null; }
  document.getElementById('view-video').srcObject = null;
  setStatus('view-status', 'Отключено', '#aab');
  talking = false;
  document.getElementById('talk-btn').textContent = '🎤 Говорить';
}

// ===== Говорить (вкл/выкл микрофон) =====
function toggleTalk() {
  if (!viewMicStream) { alert('Микрофон не активен'); return; }
  talking = !talking;
  viewMicStream.getAudioTracks().forEach(function(t){ t.enabled = talking; });
  var btn = document.getElementById('talk-btn');
  btn.textContent = talking ? '🔴 Идёт передача' : '🎤 Говорить';
  btn.className = talking ? 'danger' : 'secondary';
}

// ===== Скриншот =====
function takeShot() {
  var v = document.getElementById('view-video');
  if (!v.videoWidth) { alert('Нет видео'); return; }
  var c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  var url = c.toDataURL('image/png');

  var a = document.createElement('a');
  a.href = url;
  var d = new Date();
  a.download = 'oldcam-' + d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate() +
               '-' + d.getHours() + '-' + d.getMinutes() + '-' + d.getSeconds() + '.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);

  // Превью
  var list = document.getElementById('shots');
  var img = document.createElement('img');
  img.src = url;
  list.insertBefore(img, list.firstChild);
}

// ===== Полный экран =====
function toggleFullscreen() {
  var v = document.getElementById('view-video');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (v.requestFullscreen) v.requestFullscreen();
    else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
</script>
</body>
</html>
