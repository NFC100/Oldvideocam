<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя IP-камера</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background-color: #ffffff; padding: 24px; border-radius: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        h2 { color: #1a1c1e; text-align: center; }
        .video-wrapper { width: 100%; border-radius: 20px; overflow: hidden; background-color: #000; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info-box { background: #d1e4ff; padding: 12px; border-radius: 12px; text-align: center; font-size: 18px; color: #001d36; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 14px; border-radius: 12px; border: 1px solid #ccc; font-size: 18px; text-align: center; outline: none; font-weight: bold; letter-spacing: 2px; }
        input:focus { border-color: #0061a4; }
        .btn { border: none; padding: 14px; border-radius: 24px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-cam { background-color: #0061a4; color: white; }
        .btn-watch { background-color: #2e7d32; color: white; }
        
        /* Стили для кнопки сирены */
        .btn-siren { background-color: #ff9800; color: white; font-weight: bold; display: none; }
        .btn-siren.active { background-color: #d32f2f; animation: flash 0.5s infinite; }
        
        @keyframes flash {
            0% { background-color: #d32f2f; }
            50% { background-color: #ff5252; }
            100% { background-color: #d32f2f; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Видеонаблюдение</h2>
        
        <div class="video-wrapper">
            <video id="video-player" autoplay playsinline></video>
        </div>

        <div id="status" class="info-box">Подключение к серверу...</div>

        <div class="controls" id="mode-selection" style="display: none;">
            <button class="btn btn-cam" onclick="startCameraMode()">1. Сделать это КАМЕРОЙ</button>
            <input type="text" id="target-id" placeholder="ПИН-КОД (5 цифр)" maxlength="5">
            <button class="btn btn-watch" onclick="startViewerMode()">2. СМОТРЕТЬ</button>
        </div>

        <button id="btn-siren" class="btn btn-siren" onclick="toggleSiren()">🚨 ВКЛЮЧИТЬ СИРЕНУ</button>
    </div>

    <script>
        const videoElement = document.getElementById('video-player');
        const statusBox = document.getElementById('status');
        const modeSelection = document.getElementById('mode-selection');
        const btnSiren = document.getElementById('btn-siren');
        
        const myPin = Math.floor(10000 + Math.random() * 90000).toString();
        const peer = new Peer(myPin); 
        
        let myStream = null;
        let activeConnection = null; // Хранит активное соединение
        let isSirenOn = false;

        // --- Переменные для звука ---
        let audioCtx = null;
        let sirenOscillator = null;
        let sirenInterval = null;

        peer.on('open', function(id) {
            statusBox.innerText = "Готово к работе!";
            modeSelection.style.display = 'flex';
        });

        // ==========================================
        // РЕЖИМ 1: КАМЕРА (Планшет)
        // ==========================================
        async function startCameraMode() {
            try {
                // Инициализируем аудио движок по клику, чтобы браузер разрешил звук
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElement.srcObject = myStream;
                videoElement.muted = true;
                
                statusBox.innerHTML = `ПИН-КОД КАМЕРЫ:<br><span style="font-size: 32px; font-weight: 900; letter-spacing: 4px; color: #0061a4;">${myPin}</span>`;
                modeSelection.style.display = 'none';

                peer.on('connection', function(conn) {
                    conn.on('data', function(data) {
                        if (data === 'WATCH_ME') {
                            statusBox.innerHTML = `ПИН-КОД: ${myPin}<br><span style="color: #2e7d32;">Трансляция идет!</span>`;
                            peer.call(conn.peer, myStream);
                        }
                        // Обработка команд сирены
                        if (data === 'START_SIREN') playSirenLocally();
                        if (data === 'STOP_SIREN') stopSirenLocally();
                    });
                });

            } catch (err) {
                statusBox.innerText = "Ошибка доступа к камере!";
            }
        }

        // ==========================================
        // РЕЖИМ 2: ЗРИТЕЛЬ (Телефон)
        // ==========================================
        function startViewerMode() {
            const camId = document.getElementById('target-id').value.trim();
            if (camId.length !== 5) {
                alert("Введите 5-значный ПИН-код!");
                return;
            }

            statusBox.innerText = "Подключение...";
            modeSelection.style.display = 'none';

            activeConnection = peer.connect(camId);
            activeConnection.on('open', function() {
                activeConnection.send('WATCH_ME'); 
            });

            peer.on('call', function(call) {
                call.answer(); 
                call.on('stream', function(remoteStream) {
                    videoElement.srcObject = remoteStream;
                    statusBox.innerText = "В эфире";
                    // Показываем кнопку сирены, когда видео пошло
                    btnSiren.style.display = 'block'; 
                });
            });

            peer.on('error', function(err) {
                statusBox.innerText = "Камера не найдена!";
                setTimeout(() => location.reload(), 3000);
            });
        }

        // ==========================================
        // ЛОГИКА УПРАВЛЕНИЯ СИРЕНОЙ (КНОПКА ЗРИТЕЛЯ)
        // ==========================================
        function toggleSiren() {
            if (!activeConnection) return;

            if (!isSirenOn) {
                activeConnection.send('START_SIREN'); // Отправляем приказ планшету
                btnSiren.innerText = "🔇 ВЫКЛЮЧИТЬ СИРЕНУ";
                btnSiren.classList.add('active');
                isSirenOn = true;
            } else {
                activeConnection.send('STOP_SIREN');
                btnSiren.innerText = "🚨 ВКЛЮЧИТЬ СИРЕНУ";
                btnSiren.classList.remove('active');
                isSirenOn = false;
            }
        }

        // ==========================================
        // ГЕНЕРАТОР ЗВУКА СИРЕНЫ (РАБОТАЕТ НА ПЛАНШЕТЕ)
        // ==========================================
        function playSirenLocally() {
            if (!audioCtx) return;
            if (sirenOscillator) return; // Сирена уже орет

            sirenOscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            sirenOscillator.type = 'sawtooth'; // Резкий "пилящий" звук
            gainNode.gain.value = 1.0; // Максимальная громкость
            
            sirenOscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            sirenOscillator.frequency.value = 600;
            sirenOscillator.start();

            // Переключаем частоту туда-сюда, как у спецсигнала
            sirenInterval = setInterval(() => {
                sirenOscillator.frequency.value = sirenOscillator.frequency.value === 600 ? 1200 : 600;
            }, 300);
        }

        function stopSirenLocally() {
            if (sirenOscillator) {
                clearInterval(sirenInterval);
                sirenOscillator.stop();
                sirenOscillator.disconnect();
                sirenOscillator = null;
            }
        }
    </script>
</body>

            });

            peer.on('error', function(err) {
                statusBox.innerText = "Камера не найдена!";
                setTimeout(() => location.reload(), 3000);
            });
        }
    </script>
</body>
</html>
